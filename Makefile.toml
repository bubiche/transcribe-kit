[config]
default_to_workspace = false

[tasks.setup]
description = "Install required Rust target and CLI tools for local development"
script_runner = "bash"
script = [
  "rustup target add wasm32-unknown-unknown",
  "cargo install trunk --locked",
  "cargo install tauri-cli --version '^2.8'"
]

[tasks.dev]
description = "Run the desktop app in development mode"
command = "cargo"
args = ["tauri", "dev"]

[tasks.build]
description = "Build production desktop bundles"
command = "cargo"
args = ["tauri", "build"]

[tasks.build-frontend]
description = "Build the Leptos frontend only"
command = "trunk"
args = ["build", "--release"]

[tasks.test]
description = "Run formatting, linting, and tests"
dependencies = ["fmt-check", "clippy", "unit-test"]

[tasks.fmt-check]
description = "Check Rust formatting"
command = "cargo"
args = ["fmt", "--check"]

[tasks.clippy]
description = "Run Clippy lints"
command = "cargo"
args = ["clippy", "--all-targets", "--", "-D", "warnings"]

[tasks.clear-models]
description = "Delete all downloaded Whisper model files from the cache"
script_runner = "bash"
script = ["rm -rf ~/Library/Caches/dev.transcribe-kit.transcribe-kit/models/"]

[tasks.unit-test]
description = "Run the Rust test suite"
command = "cargo"
args = ["test"]
