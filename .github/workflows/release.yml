name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        type: string
      draft:
        description: "Create as draft release"
        required: false
        type: boolean
        default: true

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  MACOSX_DEPLOYMENT_TARGET: "10.15"
  CMAKE_OSX_DEPLOYMENT_TARGET: "10.15"

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Apple Silicon)
            os: macos-latest
            target: aarch64-apple-darwin
            bundle_ext: dmg
            bundle_dir: dmg
          - name: macOS (Intel)
            os: macos-latest
            target: x86_64-apple-darwin
            bundle_ext: dmg
            bundle_dir: dmg
          - name: Windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle_ext: msi
            bundle_dir: msi
          - name: Linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundle_ext: deb
            bundle_dir: deb

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }},wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Install trunk
        uses: taiki-e/install-action@v2
        with:
          tool: trunk

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libasound2-dev \
            cmake

      - name: Install cmake (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install cmake

      - name: Set version in tauri.conf.json
        shell: bash
        run: |
          if command -v jq &> /dev/null; then
            tmp=$(mktemp)
            jq '.version = "${{ inputs.version }}"' src-tauri/tauri.conf.json > "$tmp" && mv "$tmp" src-tauri/tauri.conf.json
          else
            sed -i.bak 's/"version": "[^"]*"/"version": "${{ inputs.version }}"/' src-tauri/tauri.conf.json
            rm -f src-tauri/tauri.conf.json.bak
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: bundle-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/${{ matrix.bundle_dir }}/*.${{ matrix.bundle_ext }}
            target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          readarray -d '' files < <(find artifacts -type f \( -name '*.dmg' -o -name '*.msi' -o -name '*.exe' -o -name '*.deb' \) -print0 | sort -z)
          echo "Uploading:"
          printf '%s\n' "${files[@]}"

          draft_flag=""
          if [ "${{ inputs.draft }}" = "true" ]; then
            draft_flag="--draft"
          fi

          gh release create "v${{ inputs.version }}" \
            --title "Transcribe Kit v${{ inputs.version }}" \
            --generate-notes \
            $draft_flag \
            "${files[@]}"
