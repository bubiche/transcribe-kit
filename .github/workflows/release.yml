name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        type: string
      draft:
        description: "Create as draft release"
        required: false
        type: boolean
        default: true
      platform:
        description: "Platform to build (all, linux, macos, windows)"
        required: false
        type: choice
        options:
          - all
          - linux
          - macos
          - windows
        default: all

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  MACOSX_DEPLOYMENT_TARGET: "10.15"
  CMAKE_OSX_DEPLOYMENT_TARGET: "10.15"
  APPIMAGE_EXTRACT_AND_RUN: "1"

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create-release.outputs.release_id }}

    steps:
      - uses: actions/checkout@v6

      - name: Create draft release
        id: create-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_id=$(gh api repos/${{ github.repository }}/releases \
            --method POST \
            --field tag_name="v${{ inputs.version }}" \
            --field name="Transcribe Kit v${{ inputs.version }}" \
            --field draft=true \
            --field generate_release_notes=true \
            --jq '.id')
          echo "release_id=$release_id" >> $GITHUB_OUTPUT

  prepare-matrix:
    name: Prepare Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.matrix }}
    steps:
      - id: filter
        run: |
          all='[
            {"name":"macOS (Apple Silicon)","os":"macos-latest","target":"aarch64-apple-darwin","platform":"macos"},
            {"name":"macOS (Intel)","os":"macos-latest","target":"x86_64-apple-darwin","platform":"macos"},
            {"name":"Windows","os":"windows-latest","target":"x86_64-pc-windows-msvc","platform":"windows"},
            {"name":"Linux","os":"ubuntu-latest","target":"x86_64-unknown-linux-gnu","platform":"linux"}
          ]'
          if [ "${{ inputs.platform }}" = "all" ]; then
            echo "matrix={\"include\":$(echo "$all" | jq -c)}" >> $GITHUB_OUTPUT
          else
            filtered=$(echo "$all" | jq -c '[.[] | select(.platform == "${{ inputs.platform }}")]')
            echo "matrix={\"include\":$filtered}" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build (${{ matrix.name }})
    needs: [create-release, prepare-matrix]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }},wasm32-unknown-unknown

      - name: Install trunk
        uses: taiki-e/install-action@v2
        with:
          tool: trunk

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libasound2-dev \
            cmake \
            libfuse2

      - name: Install cmake (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install cmake

      - name: Set version in tauri.conf.json
        shell: bash
        run: |
          if command -v jq &> /dev/null; then
            tmp=$(mktemp)
            jq '.version = "${{ inputs.version }}"' src-tauri/tauri.conf.json > "$tmp" && mv "$tmp" src-tauri/tauri.conf.json
          else
            sed -i.bak 's/"version": "[^"]*"/"version": "${{ inputs.version }}"/' src-tauri/tauri.conf.json
            rm -f src-tauri/tauri.conf.json.bak
          fi

      - name: Download llama-server sidecar
        shell: bash
        run: ./scripts/download-llama-server.sh ${{ matrix.target }}

      - name: Install sidecar shared libraries for linuxdeploy
        if: contains(matrix.target, 'linux')
        run: |
          # linuxdeploy resolves llama-server's .so dependencies via the
          # system linker cache. Copy them to /usr/local/lib and run ldconfig.
          sudo cp src-tauri/binaries/*.so* /usr/local/lib/ 2>/dev/null || true
          sudo ldconfig
          echo "Installed .so files:"
          ls -la /usr/local/lib/lib{llama,mtmd,ggml}* 2>/dev/null || echo "(none found)"

      - name: Add DLL resources to Windows bundle
        if: contains(matrix.target, 'windows')
        shell: bash
        run: |
          # Windows DLLs (llama.dll, ggml.dll, etc.) must be bundled alongside
          # the llama-server sidecar so the OS DLL loader can find them.
          cd src-tauri
          python -c "
          import json
          with open('tauri.conf.json') as f:
              cfg = json.load(f)
          resources = cfg['bundle'].get('resources', {})
          resources['binaries/*.dll'] = '.'
          cfg['bundle']['resources'] = resources
          with open('tauri.conf.json', 'w') as f:
              json.dump(cfg, f, indent=2)
              f.write('\n')
          print('Added bundle.resources for Windows DLLs')
          "

      - name: Filter macOS frameworks to match downloaded libraries
        if: contains(matrix.target, 'apple-darwin')
        shell: bash
        run: |
          # The x86_64 llama.cpp release may omit some dylibs (e.g. Metal).
          # Remove any framework entries from tauri.conf.json that don't exist on disk.
          cd src-tauri
          python3 -c "
          import json, os
          with open('tauri.conf.json') as f:
              cfg = json.load(f)
          frameworks = cfg.get('bundle', {}).get('macOS', {}).get('frameworks', [])
          missing = [fw for fw in frameworks if not os.path.exists(fw)]
          if missing:
              print(f'Removing missing frameworks: {missing}')
              cfg['bundle']['macOS']['frameworks'] = [fw for fw in frameworks if os.path.exists(fw)]
              with open('tauri.conf.json', 'w') as f:
                  json.dump(cfg, f, indent=2)
                  f.write('\n')
          else:
              print('All frameworks present')
          "

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target ${{ matrix.target }} --verbose

      - name: Verify shared libraries in bundle
        shell: bash
        run: |
          target="${{ matrix.target }}"
          bundle_dir="target/${target}/release/bundle"
          libs="llama ggml mtmd"
          found=0
          total=0

          echo "Verifying shared libraries for ${target}:"

          if [[ "$target" == *"linux"* ]]; then
            appimage=$(find "$bundle_dir" -name '*.AppImage' -type f | head -1)
            if [ -z "$appimage" ]; then echo "ERROR: No AppImage found" >&2; exit 1; fi
            chmod +x "$appimage"
            "$appimage" --appimage-extract > /dev/null 2>&1
            for lib in $libs; do
              total=$((total + 1))
              matches=$(find squashfs-root -name "lib${lib}*" -type f 2>/dev/null)
              if [ -n "$matches" ]; then
                echo "  OK: $matches"; found=$((found + 1))
              else
                echo "  MISSING: lib${lib}*.so"
              fi
            done
            rm -rf squashfs-root

          elif [[ "$target" == *"apple-darwin"* ]]; then
            app=$(find "$bundle_dir" -name '*.app' -type d | head -1)
            if [ -z "$app" ]; then echo "ERROR: No .app bundle found" >&2; exit 1; fi
            for lib in $libs; do
              total=$((total + 1))
              matches=$(find "$app/Contents/Frameworks" -name "lib${lib}*" -type f 2>/dev/null)
              if [ -n "$matches" ]; then
                echo "  OK: $matches"; found=$((found + 1))
              else
                echo "  MISSING: lib${lib}*.dylib"
              fi
            done

          elif [[ "$target" == *"windows"* ]]; then
            nsis=$(find "$bundle_dir" -name '*.exe' -path '*/nsis/*' -type f | head -1)
            if [ -z "$nsis" ]; then echo "ERROR: No NSIS installer found" >&2; exit 1; fi
            # 7z is installed on Windows GHA runners but may not be on PATH in Git Bash
            export PATH="/c/Program Files/7-Zip:$PATH"
            if ! command -v 7z &>/dev/null; then
              echo "ERROR: 7z not found — cannot inspect NSIS installer" >&2; exit 1
            fi
            contents=$(7z l "$nsis" 2>/dev/null)
            for lib in $libs; do
              total=$((total + 1))
              if echo "$contents" | grep -qi "${lib}.*\.dll"; then
                echo "  OK: ${lib}*.dll"; found=$((found + 1))
              else
                echo "  MISSING: ${lib}*.dll"
              fi
            done
          fi

          echo ""
          echo "Found ${found}/${total} expected shared libraries"
          if [ "$found" -ne "$total" ]; then
            echo "ERROR: Expected shared libraries missing from bundle" >&2; exit 1
          fi

  publish-release:
    name: Publish Release
    needs: [create-release, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: ${{ inputs.draft == false }}

    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/releases/${{ needs.create-release.outputs.release_id }} \
            --method PATCH \
            --field draft=false
